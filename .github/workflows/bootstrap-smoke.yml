name: Bootstrap Smoke

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repo
        run: bin/check

      - name: Lint shell entrypoints
        run: bash -n install.sh scripts/install-codex-assets.sh scripts/uninstall-codex-assets.sh

      - name: Smoke test marketplace command selection
        run: |
          tmp_root="$(mktemp -d)"
          bin_dir="$tmp_root/bin"
          log_path="$tmp_root/codex.log"
          mkdir -p "$bin_dir"
          cat >"$bin_dir/codex" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          printf '%s\n' "$*" >>"${CODEX_STUB_LOG}"
          if [[ "$#" -ge 3 && "$1" == "plugin" && "$2" == "marketplace" && "$3" == "add" ]]; then
            exit 0
          fi
          if [[ "$#" -ge 2 && "$1" == "marketplace" && "$2" == "add" ]]; then
            echo "legacy marketplace command should not be used" >&2
            exit 2
          fi
          exit 1
          EOF
          chmod +x "$bin_dir/codex"
          PATH="$bin_dir:$PATH" CODEX_STUB_LOG="$log_path" bash scripts/install-codex-assets.sh \
            --repo-path "$PWD" \
            --codex-home "$tmp_root/codex" \
            --install-method git \
            --resolved-ref ci \
            --skip-repo-sync \
            --force
          grep -qx 'plugin marketplace add --help' "$log_path"
          grep -qx "plugin marketplace add $PWD" "$log_path"
          ! grep -q '^marketplace add' "$log_path"

      - name: Smoke test local installer
        run: |
          tmp_root="$(mktemp -d)"
          bash scripts/install-codex-assets.sh \
            --repo-path "$PWD" \
            --codex-home "$tmp_root/codex" \
            --install-method git \
            --resolved-ref ci \
            --skip-repo-sync \
            --force
          test -f "$tmp_root/codex/state/agent-skills.json"
          bash scripts/uninstall-codex-assets.sh --codex-home "$tmp_root/codex" --force

  validate-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: PowerShell syntax smoke test
        shell: pwsh
        run: |
          $tmpCodex = Join-Path $env:RUNNER_TEMP "codex"
          pwsh -File scripts/install-codex-assets.ps1 `
            -RepoPath $PWD `
            -CodexHome $tmpCodex `
            -InstallMethod git `
            -ResolvedRef ci `
            -SkipRepoSync `
            -SkillMode copy `
            -Force
          if (-not (Test-Path (Join-Path $tmpCodex "state/agent-skills.json"))) {
            throw "state file missing after install"
          }

      - name: Remote entrypoint help from Windows PowerShell
        shell: powershell
        run: |
          & .\install.ps1 -Help | Out-Null

      - name: Remote entrypoint install from existing checkout without pwsh on PATH
        shell: powershell
        run: |
          $tmpCodex = Join-Path $env:RUNNER_TEMP "codex-remote"
          $pwsh = Get-Command pwsh -ErrorAction SilentlyContinue
          if ($pwsh) {
            $pwshDir = ([IO.Path]::GetFullPath((Split-Path $pwsh.Source -Parent))).TrimEnd('\').ToLowerInvariant()
            $env:PATH = (($env:PATH -split ';') | Where-Object {
              if (-not $_) {
                return $false
              }

              try {
                return ([IO.Path]::GetFullPath($_).TrimEnd('\').ToLowerInvariant()) -ne $pwshDir
              }
              catch {
                return $true
              }
            }) -join ';'
          }
          & .\install.ps1 `
            -RepoPath $PWD `
            -CodexHome $tmpCodex `
            -InstallMethod git `
            -SkillMode copy `
            -Force
          if (-not (Test-Path (Join-Path $tmpCodex "state/agent-skills.json"))) {
            throw "state file missing after remote entrypoint install"
          }

      - name: Smoke test marketplace command selection
        shell: pwsh
        run: |
          $tmpRoot = Join-Path $env:RUNNER_TEMP "codex-stub"
          $tmpCodex = Join-Path $tmpRoot "codex-home"
          $stubDir = Join-Path $tmpRoot "bin"
          $logPath = Join-Path $tmpRoot "codex.log"
          $stubScript = Join-Path $stubDir "codex.ps1"
          $stubCmd = Join-Path $stubDir "codex.cmd"
          New-Item -ItemType Directory -Force -Path $stubDir | Out-Null
          @'
param([Parameter(ValueFromRemainingArguments = $true)][string[]]$Args)
Add-Content -LiteralPath $env:CODEX_STUB_LOG -Value ($Args -join ' ')
if ($Args.Count -ge 3 -and $Args[0] -eq 'plugin' -and $Args[1] -eq 'marketplace' -and $Args[2] -eq 'add') {
  exit 0
}
if ($Args.Count -ge 2 -and $Args[0] -eq 'marketplace' -and $Args[1] -eq 'add') {
  Write-Error 'legacy marketplace command should not be used'
  exit 2
}
exit 1
'@ | Set-Content -LiteralPath $stubScript
          "@echo off`r`npwsh -NoLogo -NoProfile -File `"$stubScript`" %*`r`n" | Set-Content -LiteralPath $stubCmd
          $env:PATH = "$stubDir;$env:PATH"
          $env:CODEX_STUB_LOG = $logPath
          pwsh -File scripts/install-codex-assets.ps1 `
            -RepoPath $PWD `
            -CodexHome $tmpCodex `
            -InstallMethod git `
            -ResolvedRef ci `
            -SkipRepoSync `
            -SkillMode copy `
            -Force
          $logLines = Get-Content -LiteralPath $logPath
          if (-not ($logLines | Where-Object { $_ -eq 'plugin marketplace add --help' })) {
            throw "expected plugin marketplace help probe"
          }
          if (-not ($logLines | Where-Object { $_ -eq "plugin marketplace add $PWD" })) {
            throw "expected plugin marketplace add invocation"
          }
          if ($logLines | Where-Object { $_ -like 'marketplace add*' }) {
            throw "legacy marketplace add invocation detected"
          }
