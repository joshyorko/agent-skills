interface:
  display_name: "Fizzy"
  short_description: "Manage Fizzy boards, cards, comments, setup, troubleshooting, and self-hosted workflows."
  default_prompt: "Use Fizzy when the user asks about Fizzy boards, cards, comments, or workflows. Prefer available Fizzy MCP tools when already configured. Use the CLI for setup, troubleshooting, attachments, migrations, board bootstrap, CLI-only commands, or when MCP is unavailable. For self-hosted CLI work, use --api-url or FIZZY_API_URL; never fall back to curl, raw HTTP requests, endpoint probing, or HTML scraping."
policy:
  allow_implicit_invocation: true
